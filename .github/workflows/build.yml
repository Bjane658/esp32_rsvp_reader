name: Build and release firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Set release tag
        id: tag
        run: echo "TAG=$(date -u +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Write secrets.ini
        run: |
          printf '[secrets]\nbuild_flags =\n    -DAP_PASSWORD='"'"'"%s"'"'"'\n    -DOTA_SSID='"'"'"%s"'"'"'\n    -DOTA_PASSWORD='"'"'"%s"'"'"'\n' \
            "${{ secrets.AP_PASSWORD }}" \
            "${{ secrets.OTA_SSID }}" \
            "${{ secrets.OTA_PASSWORD }}" > secrets.ini
          cat secrets.ini

      - name: Build firmware
        run: pio run -e heltec_wireless_paper

      - name: Write version.txt
        run: echo "${{ steps.tag.outputs.TAG }}" > version.txt

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Firmware ${{ steps.tag.outputs.TAG }}
          files: |
            .pio/build/heltec_wireless_paper/firmware.bin
            version.txt

      - name: Delete existing latest tag
        run: git push origin :refs/tags/latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest firmware
          make_latest: true
          files: |
            .pio/build/heltec_wireless_paper/firmware.bin
            version.txt
